<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue rounded square background -->
  <rect width="100" height="100" rx="18" fill="#2563eb"/>

  <!-- Three ascending bars (subtle, background layer) -->
  <rect x="14" y="62" width="18" height="24" rx="4" fill="white" opacity="0.28"/>
  <rect x="41" y="45" width="18" height="41" rx="4" fill="white" opacity="0.28"/>
  <rect x="68" y="26" width="18" height="60" rx="4" fill="white" opacity="0.28"/>

  <!-- Rising trend line connecting bar tops -->
  <polyline
    points="23,60 50,43 77,24"
    fill="none"
    stroke="white"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Data nodes at each point -->
  <circle cx="23" cy="60" r="5.5" fill="white"/>
  <circle cx="50" cy="43" r="5.5" fill="white"/>
  <circle cx="77" cy="24" r="5.5" fill="white"/>
</svg>
